# Note: cards cite the FHWA Bridge Inspector's Reference Manual (2023, hosted at
# source.url) AND NPS Preservation Briefs 1 & 39 (nps.gov); ~23 cards cite the Briefs.
source:
  name: "Concrete & Masonry Defect Engineering References"
  url: "https://www.dot.state.mn.us/bridge/reference-manual.html"
  license: "mixed public sources; own-words summaries with citation; codes cited by reference"
cards:
  - id: eng-001
    title: "Structural flexure cracking in reinforced concrete members"
    class_tags: [crack]
    severity: monitor
    index_sentence: "vertical crack at midspan on the underside of a concrete beam or slab"
    passage: >
      Flexure cracks form in the tension zone of a bending member, typically at midspan on the
      underside of simple-span beams and slabs or over supports in continuous spans. They run
      roughly perpendicular to the primary reinforcing steel and terminate near the member's
      neutral axis. Some flexural cracking is expected in ordinary reinforced concrete under
      service loads; the finding becomes significant when cracks widen, multiply, or show rust
      staining suggesting the reinforcement itself is corroding.
    citation: "FHWA Bridge Inspector's Reference Manual (2023 ed.), Ch. 7 §7.1.6 \"Structural Flexure Cracks\"; Ch. 9 §9.4.3"

  - id: eng-002
    title: "Structural shear cracking near member supports"
    class_tags: [crack]
    severity: structural
    index_sentence: "diagonal crack angling upward from a beam support toward midspan"
    passage: >
      Shear cracks develop from diagonal tension in the web of a beam or slab near its supports,
      where shear stress is highest; they usually originate low on the member near the bearing
      and climb diagonally toward midspan. Because they signal a loss of shear capacity rather than ordinary
      bending distress, diagonal cracks near supports warrant careful measurement and engineering
      evaluation rather than routine monitoring alone. Similar diagonal cracking can appear in
      abutment backwalls, pier caps, columns, and footings.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Structural Shear Cracks\"; Ch. 9 §9.4.2"

  - id: eng-003
    title: "Nonstructural shrinkage and plastic-shrinkage cracking"
    class_tags: [crack]
    severity: cosmetic
    index_sentence: "short, irregular, map-like cracks on a concrete surface from early drying shrinkage"
    passage: >
      Plastic-shrinkage cracks form while concrete is still curing, as surface moisture
      evaporates faster than bleed water can replace it, producing short, irregular cracks that
      rarely penetrate the full depth of the member. Later drying-shrinkage cracking occurs as
      the hardened concrete continues to lose moisture and contracts. Neither type is caused by
      structural loading, but both create pathways for water and chlorides to reach embedded
      steel, so they merit periodic monitoring despite carrying no immediate structural
      significance.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Nonstructural Cracks — Shrinkage Cracks\""

  - id: eng-004
    title: "Restrained thermal (temperature) cracking"
    class_tags: [crack]
    severity: monitor
    index_sentence: "crack running across a member from restrained thermal expansion or contraction"
    passage: >
      Temperature cracks occur when a concrete member is prevented from expanding or contracting
      freely as its temperature changes, often because a bearing has seized or an expansion joint
      is clogged with debris. These cracks tend to run straighter and more parallel than shrinkage
      cracks and occur transverse to the member's long axis in locations not otherwise expected to
      be in bending. Confirming whether an adjacent joint or bearing is functioning correctly helps
      distinguish a thermal crack from one caused by structural distress.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Nonstructural Cracks — Temperature Cracks\""

  - id: eng-005
    title: "Mass-concrete thermal-gradient cracking"
    class_tags: [crack]
    severity: monitor
    index_sentence: "internal cracking in a thick concrete section from uneven curing heat"
    passage: >
      In thick or massive concrete pours, heat generated by cement hydration dissipates from the
      surface much faster than from the core, creating a temperature differential that puts the
      cooler exterior into tension. When that tension exceeds the concrete's early-age tensile
      strength, thermal-gradient cracks develop, most often in large piers, footings, or abutments
      rather than thin slabs. Because the cause is internal to the pour rather than applied load,
      these cracks are generally non-structural but should still be measured and tracked for
      growth.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Nonstructural Cracks — Mass Concrete Cracks\""

  - id: eng-006
    title: "Crack orientation categories and pattern (map) cracking"
    class_tags: [crack]
    severity: monitor
    index_sentence: "interconnected network of cracks forming a map-like pattern on concrete"
    passage: >
      Inspectors classify cracks by orientation as transverse, longitudinal, diagonal,
      pattern/map, or random, since orientation relative to a member's span and reinforcement
      helps identify the likely cause. Pattern or map cracking, an interconnected network rather
      than a single linear fracture, is a hallmark of internal expansive reactions such as
      alkali-silica reaction, especially where the surface stays chronically damp. Because there
      is no reliable early visual test to confirm the specific chemical cause, map cracking of
      unknown origin generally warrants laboratory petrographic examination.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Crack Orientation\"; \"Alkali-Silica Reaction\""

  - id: eng-007
    title: "Crack width classification and progress monitoring"
    class_tags: [crack]
    severity: monitor
    index_sentence: "a crack held against comparator-card markings ranging from hairline to wide"
    passage: >
      Crack significance is judged largely by width: published bridge-element condition guidance
      treats reinforced-concrete cracks under roughly 0.012 in. as insignificant, 0.012-0.05 in.
      as moderate, and anything wider as a wide crack needing closer attention; prestressed
      concrete uses a much tighter scale, around 0.004-0.009 in., because that material is not
      expected to crack in service at all. A transparent crack-comparator card or a dedicated
      crack gauge gives a repeatable width reading, and cracks seen opening and closing under live
      load, called "working" cracks, are distinguished from dormant ones that no longer move.
      Witness marks placed across a crack at each visit let later inspections confirm whether it
      is stable or still propagating.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Crack Size\"; §7.1.9; cf. ACI 224R crack-width guidance (cited by reference)"

  - id: eng-008
    title: "Differential settlement cracking in foundations and substructures"
    class_tags: [crack]
    severity: structural
    index_sentence: "diagonal crack in a foundation wall from uneven settlement of the ground beneath it"
    passage: >
      When one part of a foundation or substructure settles more than an adjacent part, the
      differential movement puts the connecting concrete into unplanned bending and shear,
      producing cracks that are usually oriented vertically or diagonally rather than following a
      simple load pattern. These cracks often taper, widening at one end, and may be accompanied
      by visible misalignment, binding doors or windows, or an out-of-level slab. Because ongoing
      settlement can continue to open the crack over time, differential-settlement cracking should
      be monitored with witness marks and referred for engineering evaluation if movement
      continues.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Differential Foundation Movement\"; see also IRC R401/R404 foundation provisions (cited by reference)"

  - id: eng-009
    title: "Stair-step cracking in masonry veneer and CMU walls"
    class_tags: [crack]
    severity: structural
    index_sentence: "zigzag crack following the mortar joints diagonally across a brick or block wall"
    passage: >
      In unit masonry, the same differential-settlement forces that cause diagonal cracks in
      poured concrete instead follow the path of least resistance through the mortar bed and head
      joints, producing a zigzag "stair-step" crack rather than a straight fracture through the
      units themselves. A stair-step crack that is wider at one point than another, or that keeps
      growing, indicates ongoing differential movement of the foundation beneath the wall and
      should not be treated as ordinary shrinkage cracking. Isolated, hairline, uniform-width
      stair-step cracks unrelated to visible settlement are lower priority but should still be
      logged and re-checked at the next inspection.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Differential Foundation Movement\" (mortar-joint analog); see also ACI 530/TMS 402 masonry provisions (cited by reference)"

  - id: eng-010
    title: "Cracking in prestressed concrete members"
    class_tags: [crack, exposed_rebar]
    severity: structural
    index_sentence: "unexpected crack on the underside of a prestressed concrete beam"
    passage: >
      Prestressed members are designed to remain in compression under service load, so any
      flexural cracking on the tension face is a more serious finding than similar cracking in
      conventionally reinforced concrete and typically indicates overload or a loss of prestress
      force. Fine prestress cracks can be hard to see with the naked eye, so a dedicated crack
      gauge rather than a standard comparator card is used to measure them. Any cracking on a
      prestressed element should be paired with a check for camber loss, since both findings
      together point toward reduced load capacity.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Loss of Prestress\"; Ch. 9 §9.4.3"

  - id: eng-011
    title: "Longitudinal cracks that conceal reinforcement corrosion"
    class_tags: [crack, corrosion_stain, exposed_rebar]
    severity: structural
    index_sentence: "hairline crack running parallel to embedded reinforcing strands in a beam"
    passage: >
      Cracks that run parallel to the primary reinforcement were historically treated as low
      priority because they do not appear to result from bending or shear. A documented 2005
      prestressed-beam failure showed that a single "insignificant" longitudinal crack can wick
      moisture directly onto embedded strands and transfer corrosion laterally to neighboring
      strands through corroding stirrups, causing section loss that is not visible from the
      surface. Longitudinal cracking on the tension faces of beams and box girders should
      therefore be probed and, where reinforcement is suspected to be affected, referred for
      engineering evaluation rather than dismissed as cosmetic.
    citation: "FHWA BIRM (2023) Ch. 9 §9.5.1 \"Lake View Drive Bridge over Interstate I-70\" (forensic case history)"

  - id: eng-012
    title: "Cracking associated with member overstress"
    class_tags: [crack]
    severity: structural
    index_sentence: "wide crack accompanied by sagging or excessive deflection in a concrete beam"
    passage: >
      Overstress cracking appears when a member has been loaded beyond its intended capacity and
      is usually accompanied by other overload signs such as excessive sagging at midspan, unusual
      vibration or deflection under traffic, or permanent deformation. Diagonal cracks near
      supports combined with sagging suggest overstress in shear, while cracking and spalling
      concentrated at midspan or over piers suggest overstress in bending. Any combination of
      cracking with visible deformation should be treated as an urgent finding pending engineering
      review.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Overload Damage\""

  - id: eng-013
    title: "Spalling caused by corroding reinforcement"
    class_tags: [spalling, exposed_rebar, corrosion_stain]
    severity: structural
    index_sentence: "concrete broken away in a shallow depression directly over reinforcing steel"
    passage: >
      Most concrete spalls are caused by corrosion of the embedded reinforcing steel: as the bar
      rusts, the corrosion byproduct swells to many times the steel's original volume, and that
      expansion builds enough internal pressure to fracture and push off the concrete cover above
      it. The spall reveals a fracture plane
      roughly parallel to the surface and frequently exposes the corroded bar itself. Because
      spalling of this type indicates active, ongoing corrosion rather than a one-time event, the
      exposed reinforcement should be evaluated for section loss even where the spall itself looks
      minor.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Spalling\"; \"Reinforcing Steel Corrosion\""

  - id: eng-014
    title: "Small spalls (minor surface loss)"
    class_tags: [spalling]
    severity: monitor
    index_sentence: "shallow concrete spall roughly one inch deep and a few inches across"
    passage: >
      A small spall is generally no more than about one inch deep and roughly six inches or less
      in diameter. At this scale, spalling is usually a maintenance-watch item rather than an
      urgent repair unless it sits over primary reinforcement or a high-stress zone, in which case
      the underlying cause still needs to be identified. Small spalls should be measured and
      logged at each inspection cycle to confirm the area is not enlarging.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Spalling\""

  - id: eng-015
    title: "Large spalls requiring prompt repair"
    class_tags: [spalling, exposed_rebar]
    severity: urgent
    index_sentence: "large concrete spall over an inch deep with reinforcement exposed"
    passage: >
      Large spalls exceed roughly one inch in depth or six inches in diameter and commonly expose
      primary reinforcement to the environment, which accelerates corrosion by removing the
      protective concrete cover. Because the exposed steel now corrodes faster, large spalls
      should be prioritized for prompt patch repair rather than left for a future maintenance
      cycle. Any large spall located in a high-moment or high-shear zone should be brought to a
      structural engineer's attention.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Spalling\""

  - id: eng-016
    title: "Freeze-thaw-driven spalling and scaling"
    class_tags: [spalling]
    severity: urgent
    index_sentence: "surface concrete flaking and breaking away after repeated freeze-thaw cycles"
    passage: >
      Water trapped in the capillary pores of hardened concrete expands as it freezes, and
      repeated freeze-thaw cycling builds internal pressure that progressively cracks, scales, and
      eventually spalls the surface. Concrete that is poorly air-entrained or finished improperly
      is especially vulnerable to this mechanism. Because freeze-thaw damage tends to accelerate
      once it starts, areas showing early scaling in a climate with frequent freeze-thaw cycling
      should be scheduled for sealing or repair before the next cold season rather than deferred.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Freeze-Thaw\"; \"Scaling\""

  - id: eng-017
    title: "Delamination as a precursor to spalling"
    class_tags: [spalling, exposed_rebar]
    severity: urgent
    index_sentence: "hollow-sounding area of concrete that has separated internally but not yet broken away"
    passage: >
      Delamination occurs when a layer of concrete separates from the body of the member at
      roughly the depth of the outermost reinforcing steel, most often because corrosion of that
      steel has broken the bond between bar and concrete. A delaminated area shows no surface
      crack yet, but once it fully separates and drops out, the result is a spall. Because
      delaminated concrete is effectively a spall waiting to happen, tapping suspect areas to
      check for a hollow response should be part of any inspection where corrosion is suspected.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Delamination\""

  - id: eng-018
    title: "Sounding methods for detecting delamination"
    class_tags: [spalling]
    severity: monitor
    index_sentence: "an outwardly normal concrete surface concealing a hollow, delaminated patch beneath it"
    passage: >
      Delaminated concrete gives a dull, hollow response when struck, compared with the solid,
      ringing response of sound concrete, so tapping suspect areas with an inspection hammer or
      rotary percussion tool is a standard way to find hidden separation before it becomes a
      visible spall. On large horizontal surfaces such as slabs and decks, a chain drag, several
      chain sections mounted on a handle and dragged across the surface, covers ground faster
      while listening for the same change in tone. The boundaries of any hollow-sounding area
      found this way should be marked so its extent can be recorded and tracked.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Physical Inspection Methods\""

  - id: eng-019
    title: "Distinguishing overstress spalls from corrosion spalls"
    class_tags: [spalling, crack]
    severity: structural
    index_sentence: "spall located directly at a flexure or shear crack rather than scattered corrosion pitting"
    passage: >
      While most spalls trace back to corroding reinforcement, a spall located at or immediately
      adjacent to a flexural or shear crack, especially in a high-moment region, can instead
      indicate the member has crushed in compression from overstress. This distinction matters
      because an overstress-related spall points to a structural capacity problem rather than a
      durability problem and should be escalated to a structural engineer rather than handled as
      routine patch maintenance. Checking whether the spall coincides with an existing structural
      crack is a quick first step in the field.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Spalling\""

  - id: eng-020
    title: "Subflorescence-driven masonry spalling"
    class_tags: [spalling, efflorescence]
    severity: urgent
    index_sentence: "masonry surface popping or flaking off from salt crystals grown just beneath it"
    passage: >
      When waterborne soluble salts crystallize below the surface of masonry rather than at it,
      the growing crystals exert pressure from within and can eventually pop off a thin layer of
      the surface, a mechanism distinct from ordinary surface efflorescence, which is just a
      harmless powdery bloom. This subsurface crystallization, called subflorescence, is made
      worse by water-repellent coatings that trap moisture inside the wall and slow its
      evaporation at the surface. Masonry showing surface popping or thin spalling near visible
      efflorescence should be checked for a coating that may be blocking normal drying.
    citation: "NPS Preservation Brief 1: Assessing Cleaning and Water-Repellent Treatments for Historic Masonry Buildings (Mack & Grimmer), \"Water-Repellent Coatings\""

  - id: eng-021
    title: "Repair procedure for spalled concrete"
    class_tags: [spalling, exposed_rebar]
    severity: monitor
    index_sentence: "patched concrete repair over a formerly spalled, exposed-rebar area"
    passage: >
      A durable spall repair starts by removing concrete back to sound material well beyond the
      visibly damaged area, since corrosion and chloride contamination usually extend past what is
      obvious to the eye. Exposed reinforcing steel is cleaned to bare metal and, where section
      loss is significant, evaluated before a corrosion-inhibiting or passivating treatment is
      applied, and the patch material is chosen to bond well and match the surrounding concrete's
      stiffness so the repair does not simply shift stress to the adjacent, still-contaminated
      concrete. Sound-testing the repaired area after curing helps confirm the patch has bonded
      rather than delaminated.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Reinforcing Steel Corrosion\"; general concrete-repair practice"

  - id: eng-022
    title: "Frost-related splitting and spalling of stone masonry and mortar"
    class_tags: [spalling]
    severity: monitor
    index_sentence: "small chips or fragments breaking away from a stone masonry surface"
    passage: >
      In stone masonry, water freezing within seams, pores, and mortar joints can split individual
      stones or pop small fragments from the surface, particularly in more porous stone types with
      higher water absorption. This deterioration mode is distinct from concrete spalling in that
      it is governed mainly by the stone's porosity and durability rather than by embedded steel
      corrosion, since traditional stone masonry generally has no reinforcing steel. Softer, more
      porous stones are more susceptible than dense granite and should be prioritized when
      scheduling repointing or protective maintenance.
    citation: "FHWA BIRM (2023) Ch. 7 §7.5.5 \"Anticipated Modes of Stone Masonry and Mortar Deficiencies\""

  - id: eng-023
    title: "Efflorescence formation mechanism"
    class_tags: [efflorescence]
    severity: monitor
    index_sentence: "white, chalky powder deposit where moisture has evaporated from concrete or masonry"
    passage: >
      Efflorescence forms when water moving through the pores of concrete or masonry dissolves
      soluble calcium compounds and salts, carries them to the surface, and leaves them behind as
      a whitish deposit once the water evaporates. The presence of efflorescence is not itself
      structural damage; it is a visible marker that moisture has been migrating through the
      material, often along cracks or planes of higher permeability. Because the deposit is
      essentially proof of a moisture pathway, its presence should prompt a check for the
      moisture's source rather than only cosmetic cleaning.
    citation: "FHWA Bridge Inspector's Reference Manual (2023 ed.), Ch. 7 §7.1.6 \"Efflorescence\""

  - id: eng-024
    title: "Efflorescence as a moisture-pathway indicator"
    class_tags: [efflorescence, water_damage]
    severity: monitor
    index_sentence: "efflorescence bloom concentrated along a crack, tracing where water has seeped through"
    passage: >
      Because efflorescence requires both a source of soluble salts and a route for moisture to
      travel, its location on a surface is a useful map of where water is actually entering or
      moving through a structure, for example concentrated along a crack, at a construction joint,
      or below a leaking scupper. Tracing efflorescence back to its likely path is often faster
      than instrumented moisture testing for identifying an obvious entry point. Once the moisture
      route is fixed, efflorescence typically stops recurring, confirming the repair was
      effective.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\" (efflorescence from cracks)"

  - id: eng-025
    title: "Subflorescence versus surface efflorescence"
    class_tags: [efflorescence]
    severity: urgent
    index_sentence: "salt crystals forming just below a masonry surface rather than blooming on top of it"
    passage: >
      If the same soluble salts that produce surface efflorescence instead crystallize beneath the
      surface, the condition is called subflorescence, and it is considerably more damaging
      because the growing crystals can exert enough pressure to disrupt the material from within.
      Subflorescence is not always visible until it has already caused surface popping, thin
      spalling, or a granular loosening of the surface. Because subflorescence risk increases when
      moisture is prevented from reaching the surface to evaporate, any coating or repair that
      slows outward drying should be applied cautiously on masonry known to contain soluble salts.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Water-Repellent Coatings\""

  - id: eng-026
    title: "Primary (construction-related) efflorescence"
    class_tags: [efflorescence]
    severity: cosmetic
    index_sentence: "light, one-time efflorescence bloom on newly placed concrete or new masonry"
    passage: >
      New concrete and masonry often display a light efflorescence bloom in the first months after
      construction, produced as residual mix water and curing water carry soluble salts to the
      surface while the material dries out. This "primary" efflorescence typically fades on its
      own as the available near-surface salts are depleted and the material reaches equilibrium
      moisture content, and it does not indicate an ongoing moisture problem. Primary efflorescence
      that persists beyond the first year or keeps returning after cleaning should be
      re-classified as recurrent and investigated for a continuing moisture source.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Efflorescence\"; general construction-curing behavior"

  - id: eng-027
    title: "Recurrent efflorescence and the rising-damp tide line"
    class_tags: [efflorescence, water_damage]
    severity: urgent
    index_sentence: "horizontal band of efflorescence a few feet above grade that reappears after cleaning"
    passage: >
      Masonry walls drawing moisture up from the ground by capillary action often develop a
      horizontal band of efflorescence a few feet above grade, at roughly the height where the
      rising moisture evaporates; because the water table and evaporation rate vary seasonally,
      this band can shift up and down the wall through the year. Unlike a one-time construction
      bloom, this efflorescence keeps returning after cleaning because the ground-moisture source
      never stops. Recurring efflorescence at a consistent height above grade should be treated as
      a sign of rising damp rather than routine cosmetic staining.
    citation: "NPS Preservation Brief 39: Holding the Line — Controlling Unwanted Moisture in Historic Buildings (Park), \"Transport or Movement of Moisture — Capillary Action\""

  - id: eng-028
    title: "Differentiating efflorescence from mold or algae growth"
    class_tags: [efflorescence, mold_algae]
    severity: monitor
    index_sentence: "comparing a dry powdery white deposit to a fuzzy or slimy green-black growth"
    passage: >
      Efflorescence and biological growth can both appear as discoloration on a damp wall, but
      they have different textures and origins: efflorescence is a dry, crystalline mineral
      deposit that often brushes off easily and will typically dissolve if wetted again, while
      mold and algae are living organic growths that look fuzzy, slimy, or velvety and usually
      persist or spread rather than washing away with a light touch. Checking whether the deposit
      is powdery and mineral versus organic and textured, and whether there is a musty odor, is
      usually enough to tell the two apart in the field. Because the moisture-management response
      differs, misidentifying one for the other can lead to the wrong remediation.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Biological Growth\"; general building-inspection practice"

  - id: eng-029
    title: "Efflorescence caused by cleaning chemical residue"
    class_tags: [efflorescence]
    severity: cosmetic
    index_sentence: "hazy white residue on masonry after acid-based cleaning, resembling efflorescence"
    passage: >
      Some masonry cleaning chemicals, particularly hydrofluoric-acid-based products, can etch the
      surface and leave behind whitish silica or calcium fluoride residues that closely resemble
      ordinary moisture-driven efflorescence but are actually a byproduct of the cleaning process
      itself. This cleaning-induced residue can sometimes be removed by a second, careful cleaning,
      but if the reaction has formed a colloidal deposit it may be effectively permanent. Before
      treating a post-cleaning white haze as a moisture problem, it is worth confirming what
      cleaning product was used and when.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Chemical Cleaners to Remove Dirt\""

  - id: eng-030
    title: "Rust-stained efflorescence indicating reinforcement corrosion"
    class_tags: [efflorescence, corrosion_stain, exposed_rebar]
    severity: structural
    index_sentence: "efflorescence deposit discolored reddish-brown near a crack in reinforced concrete"
    passage: >
      When efflorescence emerging from a crack is tinted reddish-brown rather than plain white,
      the discoloration signals that the moisture reaching the surface has picked up corrosion
      products from the embedded reinforcing steel along the way. This combination is considerably
      more significant than plain efflorescence, since it means corrosion is already active at the
      crack rather than the crack simply letting moisture through. Rust-tinted efflorescence
      should prompt sounding and, if section loss is suspected, exposure of the reinforcement to
      confirm its condition.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-031
    title: "Cleaning and removal of efflorescence"
    class_tags: [efflorescence]
    severity: cosmetic
    index_sentence: "dry-brushing white efflorescence deposits off a masonry wall with a stiff bristle brush"
    passage: >
      Light efflorescence is usually best removed dry, with a stiff natural- or synthetic-bristle
      brush, since adding more water to wash it off can temporarily redissolve the salts back into
      the wall and feed a fresh bloom later. Persistent or heavier deposits may need a mild
      detergent solution and low-pressure rinsing, but acidic cleaners should be avoided on
      acid-sensitive stone and lime mortars, and any chemical cleaner should be tested on an
      inconspicuous area first. Repeated cleaning without addressing the moisture source only
      manages the symptom and should be paired with a search for why the wall keeps getting wet.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Cleaning\"; NPS Preservation Brief 39 (Park)"

  - id: eng-032
    title: "Material choices that reduce efflorescence potential"
    class_tags: [efflorescence]
    severity: monitor
    index_sentence: "a concrete or masonry surface built to resist the white efflorescence bloom seen on other walls"
    passage: >
      Because efflorescence depends on the supply of soluble alkalis and salts available to be
      carried to the surface, using low-alkali cement, clean aggregates free of soluble
      contaminants, and a well-consolidated, low-permeability concrete mix all reduce how much
      material is available to bloom. This is a preventive, materials-and-design measure rather
      than a repair, and is most relevant when planning new construction or major masonry
      repointing in a location known for chronic efflorescence. It does not eliminate the need to
      control moisture, since even low-alkali materials will bloom if kept continuously wet.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Efflorescence\"; general concrete mix-design practice"

  - id: eng-033
    title: "Moisture-transport pathways behind efflorescence"
    class_tags: [efflorescence, water_damage]
    severity: monitor
    index_sentence: "capillary rise, air infiltration, and vapor diffusion each carrying moisture through a wall"
    passage: >
      Moisture reaches a masonry surface by three distinct transport mechanisms: capillary action
      wicking liquid water up through the pore structure, commonly from ground contact; air
      infiltration carrying humid air into and through the wall assembly; and vapor diffusion
      driven by a pressure or temperature differential across the wall. Identifying which
      mechanism dominates in a given case changes the appropriate fix, since capillary rise calls
      for a damp-proof course or drainage while vapor diffusion calls for managing interior
      humidity or ventilation rather than a barrier coating. Efflorescence alone does not indicate
      which mechanism is responsible, so its pattern and location need to be read alongside other
      clues such as grade contact or interior humidity levels.
    citation: "NPS Preservation Brief 39 (Park), \"Transport or Movement of Moisture\""

  - id: eng-034
    title: "Water-repellent coatings that worsen efflorescence and subflorescence"
    class_tags: [efflorescence, peeling_paint]
    severity: monitor
    index_sentence: "clear water-repellent coating trapping moisture inside a masonry wall"
    passage: >
      A water-repellent coating is meant to shed liquid water from the outside while still letting
      vapor pass, but on masonry that already contains soluble salts, even a "breathable" coating
      can slow outward drying enough to redirect efflorescence-forming moisture into subflorescence
      beneath the surface instead. Coatings applied over an unresolved moisture source often fail
      or discolor within a few years, at which point they also become difficult to remove without
      damaging the substrate. A water-repellent coating should not be treated as a substitute for
      fixing the underlying moisture source.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Is a Water-Repellent Treatment Necessary?\""

  - id: eng-035
    title: "Interior and below-grade efflorescence as a rising-damp indicator"
    class_tags: [efflorescence, water_damage]
    severity: urgent
    index_sentence: "white efflorescence deposits on a basement or crawlspace foundation wall"
    passage: >
      Efflorescence appearing on the interior face of a basement or crawlspace foundation wall,
      rather than only on the exterior, is a stronger indicator of persistent ground moisture
      reaching the wall by capillary rise or hydrostatic pressure, since interior surfaces are
      shielded from rain and direct wetting. This pattern typically calls for exterior drainage
      improvements, foundation waterproofing, or a capillary break rather than surface cleaning
      alone. Left unaddressed, continuous interior dampness of this kind also creates conditions
      favorable to mold growth on adjacent organic materials.
    citation: "NPS Preservation Brief 39 (Park), \"Capillary Action\""

  - id: eng-036
    title: "Documenting efflorescence extent and recurrence"
    class_tags: [efflorescence]
    severity: monitor
    index_sentence: "a patch of white efflorescence that keeps reappearing in the same spot after cleaning"
    passage: >
      When logging efflorescence, note its location, the affected area, and whether the deposit is
      fresh bloom or an older, weathered residue, since a fresh, easily disturbed powder points to
      recent moisture movement while a hardened, long-standing deposit suggests a chronic
      condition. Photographing the affected area with a scale reference and revisiting it at the
      next inspection is the simplest way to determine whether a cleaned area has stayed clean,
      consistent with a resolved or one-time source, or has re-bloomed, consistent with an ongoing
      moisture path. This distinction directly informs whether the item can stay on routine
      monitoring or needs to be escalated.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Visual Inspection Methods\"; general documentation practice"

  - id: eng-037
    title: "Exposed reinforcing steel following spalling"
    class_tags: [exposed_rebar, spalling, corrosion_stain]
    severity: structural
    index_sentence: "corroded reinforcing bar visible after a section of concrete cover has broken away"
    passage: >
      Exposed rebar most often appears alongside a spall, since the corrosion that pushed off the
      overlying concrete cover has typically already been active for some time before the bar
      itself became visible. Once exposed, the steel corrodes faster because it now has direct
      access to oxygen and moisture without the protective, high-alkaline concrete environment it
      previously had. Any exposed primary reinforcement should be assessed for remaining
      cross-section, since continued section loss reduces the member's load capacity.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Exposed Rebar\"; \"Reinforcing Steel Corrosion\""

  - id: eng-038
    title: "Insufficient concrete cover as a root cause of rebar exposure"
    class_tags: [exposed_rebar]
    severity: structural
    index_sentence: "reinforcing bar sitting too close to the surface with minimal concrete cover over it"
    passage: >
      Where reinforcing steel was placed with less than the specified concrete cover during
      construction, that steel reaches its corrosion threshold much sooner than properly covered
      bars nearby, because chlorides and carbonation have a shorter distance to travel before
      depassivating the steel. Insufficient cover is a design-and-construction deficiency rather
      than a service-life deterioration mechanism, so isolated early exposure in an otherwise
      sound structure should raise the question of whether cover was inadequate at that specific
      location. Verifying cover depth with a cover meter in adjacent, still-sound areas helps
      determine whether the problem is localized or systemic.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Design and Construction Deficiencies\""

  - id: eng-039
    title: "Chloride-induced corrosion of embedded reinforcement"
    class_tags: [exposed_rebar, corrosion_stain]
    severity: structural
    index_sentence: "reinforcing steel corroding after chloride ions from deicing salt or marine exposure reach it"
    passage: >
      Embedded steel is normally protected from corrosion by a thin, tightly adhering oxide film
      that forms in concrete's naturally alkaline pore water. Chloride ions, introduced by
      deicing salts, marine spray, or industrial brine, and reaching the bar either by diffusing
      through sound concrete or through cracks, break down this protective film and let oxygen and
      moisture actively corrode the steel. Because chloride-driven corrosion can proceed well
      before any surface sign appears, elements in a chloride-exposed environment such as a
      deicing route or coastal zone should be checked with chloride or corrosion-potential testing
      rather than relying on visual inspection alone.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Reinforcing Steel Corrosion\"; \"Chloride Contamination\""

  - id: eng-040
    title: "Carbonation-induced corrosion of embedded reinforcement"
    class_tags: [exposed_rebar, corrosion_stain]
    severity: structural
    index_sentence: "reinforcing steel corroding as carbonation slowly lowers the concrete's protective alkalinity"
    passage: >
      Atmospheric carbon dioxide reacts with calcium hydroxide in cement paste to form calcium
      carbonate, a process called carbonation that begins at the surface and advances inward at a
      rate roughly proportional to the square root of time. As the carbonation front reaches the
      level of the reinforcing steel, it lowers the surrounding pore water's alkalinity enough to
      strip away the steel's natural protective film, after which ordinary oxygen and moisture
      exposure can begin corroding the bar even without chloride contamination. Because carbonation
      depth grows slowly and predictably, older concrete with shallow cover is at rising risk over
      time even in a chloride-free environment, and a simple carbonation-depth test on a core can
      confirm how close the front is to the reinforcement.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Carbonation\""

  - id: eng-041
    title: "Measuring and documenting reinforcement section loss"
    class_tags: [exposed_rebar]
    severity: structural
    index_sentence: "caliper measuring the remaining diameter of a corroded, exposed reinforcing bar"
    passage: >
      Once reinforcement is exposed, its remaining cross-section should be measured directly with
      calipers or a similar gauge at the most heavily pitted point, not just estimated visually,
      since surface rust can make a bar look worse or better than its actual remaining section.
      This measurement feeds directly into any updated load-capacity calculation for the member,
      since section loss reduces the steel's effective area and therefore its strength.
      Section-loss measurements should be recorded with location and date so the rate of loss, not
      just its current extent, can be tracked over successive inspections.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-042
    title: "Exposed prestressing strands as a high-severity finding"
    class_tags: [exposed_rebar]
    severity: structural
    index_sentence: "corroded prestressing strand visible through a spall or crack in a beam"
    passage: >
      Exposed prestressing strand is treated as more severe than an equivalent exposure of
      conventional reinforcing bar, because the strand operates at much higher tensile stress and
      can fail abruptly, with little visible warning, once corrosion or pitting reduces its
      section. Any exposure of prestressing steel, whether from a spall, a crack, or collision
      damage, should be documented and referred for engineering evaluation regardless of how minor
      the exposed area appears. Because prestressed members can fail suddenly rather than
      progressively sagging first, this is one of the few concrete findings that generally cannot
      be left for routine monitoring.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Loss of Prestress\"; Ch. 9 §9.5.1 case history"

  - id: eng-043
    title: "Environmentally induced cracking in exposed prestressing steel"
    class_tags: [exposed_rebar]
    severity: structural
    index_sentence: "brittle, branching crack pattern on an exposed prestressing strand under tension and corrosion"
    passage: >
      Prestressing strands exposed to both high sustained tensile stress and a corrosive
      environment can fail through environmentally induced cracking rather than ordinary
      section-loss corrosion, either a slower-growing, branched stress-corrosion pattern or a
      faster, non-branching hydrogen-induced pattern. Both mechanisms can cause a strand to fail in
      a brittle manner well before enough section loss has occurred to explain the failure by
      ordinary corrosion alone. Because the two mechanisms can only be positively distinguished
      after failure using laboratory methods, any exposed, corroding prestressing strand should be
      treated as a candidate for both and referred for engineering assessment rather than assumed
      to have gradual, predictable remaining life.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Loss of Prestress — Environmentally Induced Cracking\""

  - id: eng-044
    title: "When exposed rebar findings require a structural engineer"
    class_tags: [exposed_rebar]
    severity: structural
    index_sentence: "inspector flagging exposed, corroded primary reinforcement for engineering review"
    passage: >
      Exposed reinforcement should be escalated beyond routine maintenance and referred to a
      structural or professional engineer whenever it involves primary, load-carrying
      reinforcement with measurable section loss, any exposed prestressing tendon regardless of
      how minor the exposure looks, or exposed steel located at or near a shear or flexure crack.
      Secondary, non-load-bearing reinforcement with only minor surface corrosion and no measurable
      loss can typically remain on a monitoring schedule with a planned patch repair. Documenting
      the member type, location, and estimated percentage of section loss at the time of the
      finding gives the engineer what is needed to make that call without a separate site visit.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\"; general bridge/building inspection referral practice"

  - id: eng-045
    title: "Half-cell potential and electrical resistivity screening for hidden corrosion"
    class_tags: [exposed_rebar, corrosion_stain]
    severity: monitor
    index_sentence: "an unmarked concrete surface that may be hiding active corrosion not yet visible"
    passage: >
      Before reinforcement is visibly exposed, half-cell potential and electrical resistivity
      testing can estimate the likelihood that active corrosion is occurring beneath the surface
      by measuring the electrochemical activity of the embedded steel through the concrete. These
      nondestructive methods are especially useful for prioritizing which of several rust-stained
      or delaminated-sounding areas to open up first for direct inspection, since they flag the
      locations with the highest probability of active, ongoing corrosion rather than old,
      stabilized staining. Because they estimate probability rather than measure section loss
      directly, positive readings should be confirmed by exposing the reinforcement rather than
      acted on alone.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Advanced Inspection Methods\"; Ch. 9 §9.3.2"

  - id: eng-046
    title: "Bond loss between corroded reinforcement and surrounding concrete"
    class_tags: [exposed_rebar, spalling]
    severity: urgent
    index_sentence: "concrete separating from a corroding bar even before any spall is visible at the surface"
    passage: >
      As reinforcing steel corrodes, the expanding rust product breaks down the mechanical and
      chemical bond between the bar and the surrounding concrete well before the concrete visibly
      spalls away. This bond loss is what produces delamination: the concrete above the bar has
      already separated internally and gives a hollow sound when tapped, even though nothing looks
      wrong from a distance. Because bond loss reduces how effectively the reinforcement can
      transfer stress into the concrete, delaminated areas overlying primary reinforcement should
      be treated with the same urgency as a visible spall.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Delamination\"; \"Reinforcing Steel Corrosion\""

  - id: eng-047
    title: "Camber loss as an indirect sign of prestressing tendon distress"
    class_tags: [exposed_rebar, crack]
    severity: structural
    index_sentence: "prestressed beam showing reduced upward camber alongside new cracking on its underside"
    passage: >
      When corrosion or bond deterioration reduces the effective prestress force in a beam's
      tendons, the member gradually loses some of its designed upward camber and can develop
      flexural cracking on its underside that would not otherwise be present. Because this loss of
      camber develops slowly and is easy to overlook without a baseline reference, sighting down
      the bottom edge of a prestressed member with a string line, and comparing against as-built
      camber records where available, is a useful field check. Camber loss found together with new
      tension-face cracking should be treated as corroborating evidence of tendon distress rather
      than assessed separately.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-048
    title: "Verifying concrete cover depth after repair"
    class_tags: [exposed_rebar]
    severity: monitor
    index_sentence: "a freshly patched, smooth concrete surface over what was once exposed reinforcement"
    passage: >
      After a patch repair over previously exposed reinforcement, a cover meter or similar
      magnetic/electromagnetic locator can confirm that the new concrete provides adequate cover
      over the bar, rather than assuming the repair simply restored the original geometry.
      Checking cover in adjacent, undamaged areas of the same element also helps establish whether
      the original construction met its specified cover or whether the exposure was the result of
      a systemic placement error likely to recur elsewhere on the same structure. This check is
      inexpensive relative to a repeat repair and should be a routine step in closing out any
      exposed-rebar remediation.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Advanced Inspection Methods\" (cover/locator devices)"

  - id: eng-049
    title: "Collision damage exposing reinforcement or tendons"
    class_tags: [exposed_rebar, spalling]
    severity: structural
    index_sentence: "gouged, spalled concrete with exposed reinforcement after impact from a vehicle or debris"
    passage: >
      Impact damage from vehicles, floating debris, or equipment can crack and spall concrete in a
      single event, directly exposing reinforcement or prestressing tendons that were previously
      fully protected. Steel exposed this way is especially vulnerable afterward because the
      impact both removes protective cover and can leave residual stress concentrations at the
      damage site, accelerating subsequent corrosion at exactly the point where the member is
      already weakened. Any collision damage that exposes primary reinforcement or tendons should
      receive a prompt engineering assessment rather than being scheduled as routine patch
      maintenance.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Collision Damage\"; Ch. 9 §9.5.1 case history"

  - id: eng-050
    title: "Construction placement deficiencies that lead to premature rebar exposure"
    class_tags: [exposed_rebar]
    severity: monitor
    index_sentence: "reinforcing bars packed too closely together with poorly consolidated concrete around them"
    passage: >
      Several construction-stage errors can set up reinforcement for early exposure independent of
      environmental exposure: bars spaced too closely for the aggregate to flow between them,
      inadequate vibration leaving voids or honeycombing around the steel, and premature form
      removal that allows early-age cracking near the bar line. These deficiencies tend to produce
      exposure that clusters in a specific pour, form, or construction phase rather than being
      randomly distributed across a structure, a useful clue when investigating why one span or
      wall segment is deteriorating faster than its neighbors. Identifying a construction-era cause
      does not change the repair, but it does inform how broadly to inspect other elements from the
      same pour.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Design and Construction Deficiencies\"; \"Honeycombs\""

  - id: eng-051
    title: "Rust staining as the earliest visible sign of embedded corrosion"
    class_tags: [corrosion_stain]
    severity: monitor
    index_sentence: "reddish-brown streak bleeding out of a hairline crack in concrete"
    passage: >
      A reddish-brown or rust-colored stain bleeding from a crack or pore is often the first
      visible evidence of reinforcement corrosion, appearing well before the concrete delaminates
      or spalls, because the corrosion products are small enough to migrate through capillary
      pathways to the surface. Catching this stage during inspection allows corrective action such
      as sealing the crack, improving drainage, or applying a corrosion inhibitor before the
      expansive rust cracks the cover further. Any new rust staining noted since the previous
      inspection should be measured and its likely source, usually the nearest crack or joint,
      identified.
    citation: "FHWA Bridge Inspector's Reference Manual (2023 ed.), Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-052
    title: "Differentiating rust staining from other surface discoloration"
    class_tags: [corrosion_stain, mold_algae]
    severity: monitor
    index_sentence: "comparing a reddish-brown rust stain to a green-black biological stain on the same wall"
    passage: >
      Rust staining from corroding embedded steel is characteristically reddish-brown to orange,
      sharply concentrated at a crack, joint, or embedded metal fastener, and does not wash away
      easily since it has chemically bonded iron-oxide pigment. Biological staining from algae or
      mold, by contrast, tends to be green, black, or gray, spreads more diffusely across a damp
      surface rather than tracing a crack, and often has a slightly raised or fuzzy texture.
      Confirming which type of staining is present before specifying a repair matters, since a
      biological stain calls for cleaning and moisture control while a rust stain calls for
      investigating the reinforcement itself.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Reinforcing Steel Corrosion\"; NPS Preservation Brief 1, \"Biological Growth\""

  - id: eng-053
    title: "Rust bleeding at a crack mouth"
    class_tags: [corrosion_stain, crack]
    severity: urgent
    index_sentence: "rust stain radiating out from the mouth of a crack in a concrete member"
    passage: >
      When rust staining is concentrated specifically at the mouth of a crack rather than spread
      generally across a surface, it indicates the crack itself is the moisture pathway feeding an
      already-corroding bar directly beneath it. This combination, a crack plus localized rust
      bleed at that same crack, should be prioritized for sounding and probing ahead of
      similar-looking cracks nearby that show no staining, since it is the strongest available
      visual evidence that corrosion, not just moisture, is already underway at that location.
      Recording the stain alongside the crack's width and orientation gives a fuller picture for
      the engineer reviewing the finding.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-054
    title: "Non-structural metal staining versus reinforcement rust"
    class_tags: [corrosion_stain]
    severity: cosmetic
    index_sentence: "blue-green streak below a copper flashing or downspout, distinct from reddish rebar rust"
    passage: >
      Not every metallic stain on concrete or masonry comes from embedded reinforcement; copper
      flashing, gutters, or downspouts produce blue-green streaks as the copper oxidizes and washes
      down the face of the wall, while galvanized or other non-ferrous fittings leave their own
      distinct discoloration. These stains originate from an external, surface-mounted metal
      source rather than from steel embedded in the concrete, so they carry no implication about
      the structural member's reinforcement condition. Tracing a colored stain back to a specific
      fitting or flashing above it is usually enough to rule out embedded-rebar corrosion as the
      cause.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Removing Stains\""

  - id: eng-055
    title: "Corrosion staining on prestressed elements"
    class_tags: [corrosion_stain, exposed_rebar]
    severity: structural
    index_sentence: "rust staining at a joint or crack on a prestressed concrete beam"
    passage: >
      Rust staining on a prestressed member deserves closer scrutiny than the same finding on
      conventionally reinforced concrete, because prestressing strands operate under much higher
      stress and can fail abruptly through environmentally induced cracking once corrosion is
      underway, without the gradual warning signs typical of ordinary reinforced concrete. Staining
      near beam ends, at joints, or along a longitudinal crack on a prestressed box beam or girder
      should be treated as an early signal to inspect for exposed or corroding strands, not simply
      logged as cosmetic. Given the documented case of a prestressed beam collapse traced to
      corrosion first visible only as staining and hairline cracking, this category of finding
      should never be deferred.
    citation: "FHWA BIRM (2023) Ch. 9 §9.5.1 \"Lake View Drive Bridge over Interstate I-70\""

  - id: eng-056
    title: "Combined efflorescence and corrosion staining at tension zones"
    class_tags: [corrosion_stain, efflorescence]
    severity: urgent
    index_sentence: "efflorescence deposit tinted with rust near a crack in the tension zone of a beam"
    passage: >
      In the tension zone of a beam or slab, efflorescence and corrosion staining frequently appear
      together at the same crack, since the moisture that carries mineral salts to the surface also
      picks up iron-oxide corrosion products if reinforcement along that path is already
      corroding. This combined finding is more significant than either condition alone: plain
      efflorescence indicates moisture movement, but rust-tinted efflorescence confirms the
      moisture has already reached and is actively corroding the steel. Tension-zone cracks showing
      this combination should be prioritized for sounding and, if warranted, opened up to assess
      the reinforcement directly.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.3 \"Tension and Flexure Zones\""

  - id: eng-057
    title: "Corrosion staining concentrated at drainage and joint areas"
    class_tags: [corrosion_stain, water_damage]
    severity: monitor
    index_sentence: "rust staining below a leaking deck joint or clogged scupper"
    passage: >
      Rust staining clusters disproportionately around drainage features, such as leaking joints,
      clogged scuppers, and poorly sealed construction joints, because these locations receive
      concentrated, repeated wetting rather than the occasional exposure the rest of a structure
      experiences. Improving drainage or sealing the leaking joint at the source often does more
      to slow the corrosion than repeatedly patching the stained concrete beneath it. When logging
      corrosion staining near a joint or drain, noting whether that drainage feature is currently
      functioning helps identify whether the stain is an active, worsening condition or a legacy
      mark from a since-repaired leak.
    citation: "FHWA BIRM (2023) Ch. 9 §9.4.4 \"Areas Exposed to Drainage\""

  - id: eng-058
    title: "Using sounding to confirm delamination beneath a rust stain"
    class_tags: [corrosion_stain, spalling]
    severity: monitor
    index_sentence: "inspector hammer-sounding a rust-stained area of concrete to check for a hollow response"
    passage: >
      A rust stain by itself only confirms that corrosion has occurred somewhere along the moisture
      path reaching the surface; it does not indicate whether the concrete cover above the
      corroding bar has already debonded. Hammer-sounding or chain-dragging the stained area is the
      standard next step to determine whether the stain overlies sound concrete or a delaminated,
      spall-prone area, since visual staining and sound-testing findings do not always coincide
      exactly. Recording both the staining and the sounding result together gives a more complete
      picture than either finding alone.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Physical Inspection Methods\""

  - id: eng-059
    title: "Confirming active corrosion behind a stain with electrochemical testing"
    class_tags: [corrosion_stain, exposed_rebar]
    severity: monitor
    index_sentence: "a rust-stained concrete surface where the stain alone cannot show if corrosion is still active"
    passage: >
      Because a visible rust stain can be either a snapshot of past corrosion that has since
      stabilized or evidence of an actively progressing condition, electrochemical methods such as
      half-cell potential testing are used to determine whether the underlying reinforcement is
      still actively corroding. This distinction changes the appropriate response: a stabilized,
      historical stain can usually stay on routine monitoring, while an active reading warrants
      more immediate intervention. Advanced testing is normally reserved for cases where the
      stain's significance cannot be resolved by sounding and visual inspection alone.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Advanced Inspection Methods\""

  - id: eng-060
    title: "Distinguishing isolated staining from widespread staining for triage"
    class_tags: [corrosion_stain]
    severity: monitor
    index_sentence: "single small rust spot versus staining scattered across an entire wall or beam line"
    passage: >
      A single, small, isolated rust stain with no accompanying cracking or hollow sound is
      generally a low-priority monitoring item, especially if it can be tied to a specific,
      identifiable cause such as an embedded tie wire near the surface. Widespread staining across
      many locations on the same element, especially when paired with cracking or delamination at
      multiple points, instead suggests a systemic issue, such as inadequate cover, chloride
      exposure, or carbonation reaching the whole surface at roughly the same time, and should be
      escalated for a broader condition assessment rather than treated one spot at a time. Mapping
      the extent of staining across an element, not just noting its presence, is what allows this
      distinction to be made.
    citation: "FHWA BIRM (2023) Ch. 9 §9.6 \"Evaluation\" (condition-rating practice)"

  - id: eng-061
    title: "Staining that reappears after cleaning as a sign of active corrosion"
    class_tags: [corrosion_stain]
    severity: urgent
    index_sentence: "rust stain returning within months of being cleaned off a concrete surface"
    passage: >
      A rust stain that reappears within a few months of being cleaned indicates the corrosion
      source beneath it is still active and continuing to bleed fresh oxide to the surface, as
      opposed to a legacy stain from a past event that will not return once removed. This
      recurrence pattern is a useful, low-cost field diagnostic: rather than immediately committing
      to advanced electrochemical testing, cleaning a representative stain and checking it again at
      the next visit can establish whether the finding is active or historical. Staining confirmed
      to be recurring should move up the repair priority list even if the concrete has not yet
      visibly cracked or delaminated.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.6 \"Reinforcing Steel Corrosion\"; general inspection practice"

  - id: eng-062
    title: "Paint peeling from moisture trapped behind a coating"
    class_tags: [peeling_paint, water_damage]
    severity: monitor
    index_sentence: "paint blistering and peeling off a wall from moisture trapped underneath"
    passage: >
      When moisture is present within a wall assembly, for example from wet insulation, a leak, or
      residual construction moisture, and cannot escape through an exterior coating, vapor pressure
      builds up behind the paint film until it blisters and eventually peels. Because the paint
      failure is a symptom of the trapped moisture rather than a defect in the paint itself,
      repainting without first identifying and drying out the moisture source typically leads to
      the same peeling recurring within a short time. Peeling that follows a pattern linked to a
      specific wall section, such as near a known leak or a recent renovation, should prompt an
      investigation of that area before any refinishing.
    citation: "NPS Preservation Brief 39 (Park), Fig. 8 (paint failure from wet wall insulation)"

  - id: eng-063
    title: "Failed water-repellent or film-forming coatings on masonry"
    class_tags: [peeling_paint]
    severity: monitor
    index_sentence: "clear or painted masonry coating flaking off in sheets, exposing bare masonry beneath"
    passage: >
      Film-forming coatings applied to masonry can fail by peeling or flaking once moisture trapped
      beneath the film builds enough pressure to lift it from the substrate, a failure mode distinct
      from ordinary paint aging on a dry wood or metal surface. Because these coatings were often
      applied specifically to control moisture or appearance, their failure both removes the
      intended protection and can leave a visually patchy surface that is difficult to strip
      completely and refinish evenly. A coating failing this way on masonry known to have a
      moisture problem should be treated as confirmation that the coating did not solve the
      underlying issue, rather than simply as a maintenance item to redo.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Water-Repellent Coatings and Waterproof Coatings\""

  - id: eng-064
    title: "Peeling paint as a symptom requiring root-cause diagnosis"
    class_tags: [peeling_paint]
    severity: monitor
    index_sentence: "recurring paint failure on the same section of wall despite repeated repainting"
    passage: >
      Peeling and blistering paint on masonry or concrete is best treated as a symptom of an
      underlying moisture or vapor-pressure problem rather than as the primary defect to be
      repaired. Repainting over a still-active moisture source generally produces the same failure
      again within one to a few seasons, so a coating failure that recurs in the same location
      after a prior repaint is a strong signal the actual cause was never addressed. Tracing the
      moisture back to its source, whether capillary rise, a roof or gutter leak, interior
      humidity, or a wall assembly without adequate vapor management, should precede any decision
      to recoat.
    citation: "NPS Preservation Brief 39 (Park), \"Transport or Movement of Moisture\""

  - id: eng-065
    title: "Distinguishing moisture-driven paint failure from ordinary weathering"
    class_tags: [peeling_paint]
    severity: cosmetic
    index_sentence: "uniformly faded or chalking paint versus localized peeling and blistering"
    passage: >
      Not all paint deterioration indicates a moisture problem: uniform fading, chalking, or
      thinning of a coating across an entire elevation exposed to sun and weather is ordinary aging
      and requires only routine repainting on a normal maintenance cycle. Localized peeling,
      bubbling, or blistering concentrated in one area, by contrast, points to a specific moisture
      source at that location and should be investigated before recoating. Distinguishing the two
      patterns during inspection avoids either over-treating benign weathering as a moisture
      emergency or under-treating a genuine leak as routine wear.
    citation: "NPS Preservation Brief 39 (Park), general coatings-maintenance guidance"

  - id: eng-066
    title: "Rising damp from capillary action"
    class_tags: [water_damage, efflorescence]
    severity: urgent
    index_sentence: "damp band on the lower portion of a masonry wall drawing moisture up from the ground"
    passage: >
      Rising damp occurs when moisture in saturated ground is drawn up through the pore structure
      of a masonry wall by capillary action, wicking vertically until it evaporates at the surface,
      often leaving a horizontal efflorescence line a few feet above grade. It is most persistent
      in walls with a continuous, high water table or a constant ground moisture source beneath the
      footing, and is not easily controlled by surface treatments alone. Because sealing the
      surface with a waterproof coating only forces the capillary action higher up the wall,
      effective control usually requires reducing ground moisture at the source or introducing a
      horizontal damp-proof barrier.
    citation: "NPS Preservation Brief 39 (Park), \"Transport or Movement of Moisture — Capillary Action\""

  - id: eng-067
    title: "Penetrating damp from lateral water entry"
    class_tags: [water_damage]
    severity: urgent
    index_sentence: "damp patch below a cracked wall or faulty flashing where rain has penetrated laterally"
    passage: >
      Penetrating damp is caused by liquid water entering a wall laterally through cracks, poorly
      sealed joints, or faulty roof flashing and gutters, rather than by ground moisture wicking
      upward, and it should not be confused with rising damp even though both can leave
      similar-looking damp patches. Because the entry point for penetrating damp is usually higher
      on the wall or at a specific detail, such as a flashing, a downspout joint, or a cracked
      parapet, tracing the stain upward to its source is more productive than looking at grade
      level. Repairing the specific point of entry, rather than treating the interior stain,
      resolves penetrating damp; treating only the visible stain leaves the entry path open to
      recur.
    citation: "NPS Preservation Brief 39 (Park), \"Sources of Moisture\""

  - id: eng-068
    title: "Systematic diagnosis of a building moisture source"
    class_tags: [water_damage]
    severity: monitor
    index_sentence: "a damp wall stain that could trace back to a roof leak, gutter overflow, or ground moisture"
    passage: >
      Because several distinct moisture sources, including roof and gutter failures, ground and
      site drainage, plumbing leaks, condensation, and residual construction moisture, can produce
      similar-looking staining, a systematic check of each potential source is more reliable than
      assuming the most visible one is the cause. Practical diagnosis starts by confirming whether
      gutters and downspouts are intact and directing water away from the building, then checks
      grading and site drainage near the foundation, and only then considers less obvious sources
      such as condensation or a hidden plumbing leak. Skipping this sequence and repairing only the
      most visible symptom is a common reason moisture damage recurs after an apparently completed
      repair.
    citation: "NPS Preservation Brief 39 (Park), \"Sources of Moisture\"; \"Diagnosing Moisture Problems\""

  - id: eng-069
    title: "Managing moisture through drainage and ventilation rather than sealing"
    class_tags: [water_damage]
    severity: monitor
    index_sentence: "a dry foundation wall with soil graded away from it and a downspout discharging clear of it"
    passage: >
      Because moisture movement through a building is driven by pressure and vapor differentials,
      the more durable remedy is usually to manage those differentials, draining bulk water away
      and ventilating trapped vapor, rather than to block movement entirely with an impermeable
      coating, which can simply redirect pressure and moisture damage elsewhere in the wall. A wall
      sealed on the exterior while still receiving moisture from the ground or interior can end up
      wetter internally than before treatment, since the moisture has fewer paths to dry out.
      Recommending a coating-based fix without first confirming the wall can actually dry out
      afterward risks making the underlying condition worse rather than better.
    citation: "NPS Preservation Brief 39 (Park), \"Managing Moisture\""

  - id: eng-070
    title: "Vapor diffusion and condensation as a moisture source"
    class_tags: [water_damage]
    severity: monitor
    index_sentence: "condensation forming inside a wall where humid air reaches its dew point"
    passage: >
      Vapor diffusion is the movement of water vapor through porous materials driven by a humidity
      or temperature differential across a wall, and it only becomes damaging once the vapor
      reaches a cool enough surface to condense into liquid water, either inside the wall cavity or
      on an interior surface. This mechanism is distinct from rising damp or penetrating damp
      because there is no direct liquid-water entry point to find; instead, the fix usually
      involves managing interior humidity or improving ventilation rather than sealing a leak.
      Condensation-driven dampness is more common in tightly sealed buildings or in spaces with
      high interior humidity, such as bathrooms and kitchens, adjacent to poorly insulated exterior
      walls.
    citation: "NPS Preservation Brief 39 (Park), \"Vapor Diffusion\""

  - id: eng-071
    title: "Gutter, downspout, and grading deficiencies as chronic moisture sources"
    class_tags: [water_damage]
    severity: monitor
    index_sentence: "clogged gutter and downspout discharging roof water directly against a foundation wall"
    passage: >
      Deferred maintenance on gutters and downspouts is one of the most common and most preventable
      sources of chronic building moisture: a blocked or disconnected downspout can direct a
      substantial volume of roof runoff straight against the foundation instead of away from the
      building, saturating the soil and the adjacent wall. Poor site grading that slopes toward the
      building compounds the problem by channeling additional surface water to the same location.
      Because this cause is simple to verify, by checking whether downspouts are connected, clear,
      and discharging well away from the foundation, and relatively inexpensive to fix, it should
      be ruled out early before pursuing more invasive foundation waterproofing.
    citation: "NPS Preservation Brief 39 (Park), \"Roofing and Guttering\"; \"Ground Moisture\""

  - id: eng-072
    title: "Sound, well-consolidated concrete with no active deterioration"
    class_tags: [no_defect]
    severity: cosmetic
    index_sentence: "uniform, uncracked concrete surface with no staining, spalling, or hollow sounding"
    passage: >
      Sound concrete presents a uniform surface color, no cracking beyond the finest incidental
      shrinkage marks, no rust or efflorescence staining, and returns a solid, ringing response
      rather than a dull, hollow sound when tapped with an inspection hammer or dragged with a
      chain. This baseline condition requires no repair action, only continuation of the normal
      periodic inspection cycle. Recording a clean baseline finding is still useful, since it gives
      future inspectors a documented reference point to compare against if the area later begins to
      deteriorate.
    citation: "FHWA BIRM (2023) Ch. 7 §7.1.9 \"Physical Inspection Methods\" (sound-concrete response)"

  - id: eng-073
    title: "Well-maintained masonry with intact mortar joints"
    class_tags: [no_defect]
    severity: cosmetic
    index_sentence: "brick or stone masonry wall with tight mortar joints and no cracking, spalling, or staining"
    passage: >
      Masonry in good condition shows intact, fully bedded mortar joints without gaps or crumbling,
      no stair-step or diagonal cracking, no efflorescence or biological staining, and units that
      remain firmly seated with no looseness when tapped. This condition indicates that both the
      masonry units and mortar are performing as intended and that the wall has not experienced
      significant differential movement or chronic moisture exposure. Routine periodic monitoring
      is sufficient; no remediation is indicated.
    citation: "FHWA BIRM (2023) Ch. 7 §7.5.6 \"Inspection Methods for Stone Masonry and Mortar\" (sound-condition baseline)"

  - id: eng-074
    title: "Biological growth on masonry surfaces"
    class_tags: [mold_algae]
    severity: monitor
    index_sentence: "greenish-black biological growth on a shaded, persistently damp masonry wall"
    passage: >
      Mold and algae establish on masonry surfaces where persistent dampness and organic matter,
      such as dirt, pollen, or biofilm, provide the moisture and nutrients they need, typically in
      shaded, poorly ventilated, or north-facing areas that dry out slowly after rain. Unlike
      efflorescence, biological growth is a living organism rather than a mineral deposit, and it is
      generally kept in check by regular cleaning with a bristle brush and, where needed, a
      biocide wash rather than by moisture-source repairs alone. Because biological growth thrives
      on chronic dampness, its presence is also a secondary indicator that the affected area may be
      slow to dry and worth checking for a drainage or ventilation deficiency.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), \"Biological Growth\""

  - id: eng-075
    title: "Algae staining pattern distinct from rust and efflorescence"
    class_tags: [mold_algae, water_damage]
    severity: monitor
    index_sentence: "greenish streaking on a masonry wall below a shaded, chronically damp area"
    passage: >
      Algae staining typically appears as a greenish, diffuse streak or film concentrated below a
      chronically damp, shaded area such as under a leaking gutter, a tree canopy, or a
      north-facing wall section, distinguishing it from the sharply localized reddish-brown of
      corrosion staining or the dry, powdery white of efflorescence. Because algae requires
      sustained surface moisture to establish, its presence and extent are a useful rough indicator
      of how long and how often that part of the wall stays wet relative to the rest of the
      building. Addressing the shading or drainage condition that keeps the surface damp is
      generally more durable than repeated cleaning alone.
    citation: "NPS Preservation Brief 1 (Mack & Grimmer), general staining-differential guidance"
