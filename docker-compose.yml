services:
  db:
    image: pgvector/pgvector:pg16
    container_name: defectlens-db
    environment:
      POSTGRES_USER: defectlens
      POSTGRES_PASSWORD: defectlens
      POSTGRES_DB: defectlens
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
