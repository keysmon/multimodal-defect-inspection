# DefectLens unified label-mapping table (versioned; every change gets a rationale).
# unified_label must be one of the 12 UNIFIED_CLASSES (v2, 2026-07-21), or
# EXCLUDE to drop samples.
mappings:
  # ---- CODEBRIM (concrete bridge defects, single-label crops) ----
  - source_dataset: codebrim
    source_label: background
    unified_label: no_defect
    rationale: non-defective concrete background crops
  - source_dataset: codebrim
    source_label: crack
    unified_label: crack
    rationale: direct match
  - source_dataset: codebrim
    source_label: spallation
    unified_label: spalling
    rationale: same phenomenon, naming variant
  - source_dataset: codebrim
    source_label: efflorescence
    unified_label: efflorescence
    rationale: direct match
  - source_dataset: codebrim
    source_label: exposed_bars
    unified_label: exposed_rebar
    rationale: exposed reinforcement bars
  - source_dataset: codebrim
    source_label: corrosion_stain
    unified_label: corrosion_stain
    rationale: direct match

  # ---- BD3 (building facade defects) ----
  - source_dataset: bd3
    source_label: algae
    unified_label: mold_algae
    rationale: biological growth; merged class per spec taxonomy
  - source_dataset: bd3
    source_label: major_crack
    unified_label: crack
    rationale: crack severity handled downstream, not as separate class
  - source_dataset: bd3
    source_label: minor_crack
    unified_label: crack
    rationale: crack severity handled downstream, not as separate class
  - source_dataset: bd3
    source_label: peeling
    unified_label: peeling_paint
    rationale: peeling paint/plaster on walls
  - source_dataset: bd3
    source_label: spalling
    unified_label: spalling
    rationale: direct match
  - source_dataset: bd3
    source_label: stain
    unified_label: water_damage
    rationale: BD3 stains are predominantly moisture/water staining; spot-check validates
  - source_dataset: bd3
    source_label: normal
    unified_label: no_defect
    rationale: non-defective wall surfaces
  - source_dataset: bd3
    source_label: plain
    unified_label: no_defect
    rationale: Kaggle BD3_original_dataset names the no-defect class 'plain' (GitHub docs say 'normal')

  # ---- Roboflow building-defect-on-walls (OPTIONAL dataset) ----
  - source_dataset: roboflow_walls
    source_label: crack
    unified_label: crack
    rationale: direct match
  - source_dataset: roboflow_walls
    source_label: mold
    unified_label: mold_algae
    rationale: merged class per spec taxonomy
  - source_dataset: roboflow_walls
    source_label: peeling_paint
    unified_label: peeling_paint
    rationale: direct match
  - source_dataset: roboflow_walls
    source_label: stairstep_crack
    unified_label: crack
    rationale: stair-step masonry crack is a crack subtype
  - source_dataset: roboflow_walls
    source_label: water_seepage
    unified_label: water_damage
    rationale: direct match

  # ---- SDNET2018 (concrete crack patches; C*=cracked, U*=uncracked) ----
  - source_dataset: sdnet2018
    source_label: cracked
    unified_label: crack
    rationale: binary crack dataset, crack side
  - source_dataset: sdnet2018
    source_label: non_cracked
    unified_label: no_defect
    rationale: abundant clean-concrete negatives; capped at ingest (configs/sampling.yaml)

  # ---- MBDD2025 (multi-material building defects, bbox-derived crops) ----
  - source_dataset: mbdd2025
    source_label: crack
    unified_label: crack
    rationale: direct match; extends crack beyond concrete to masonry/brick/timber/steel
  - source_dataset: mbdd2025
    source_label: leakage
    unified_label: water_damage
    rationale: facade water leakage/staining is the existing water_damage phenomenon
  - source_dataset: mbdd2025
    source_label: corrosion
    unified_label: corrosion_stain
    rationale: direct match on steel/RC members
  - source_dataset: mbdd2025
    source_label: abscission
    unified_label: finish_detachment
    rationale: render/plaster/tile shedding; distinct from concrete spalling and coating-level peeling_paint
  - source_dataset: mbdd2025
    source_label: bulge
    unified_label: bulge_deformation
    rationale: out-of-plane facade deformation; no v1 class fits

  # ---- VT corrosion condition states (CC0; severity kept as source_label) ----
  # NOTE: the "good" state never occurs per-image in the shipped data (good
  # regions are unannotated background, so every whole image is fair or worse);
  # the entry is retained for completeness should region crops be added later.
  - source_dataset: vt_corrosion
    source_label: good
    unified_label: no_defect
    rationale: state good = clean steel per AASHTO/BIRM grading
  - source_dataset: vt_corrosion
    source_label: fair
    unified_label: corrosion_stain
    rationale: early corrosion; severity state preserved in source_label
  - source_dataset: vt_corrosion
    source_label: poor
    unified_label: corrosion_stain
    rationale: advanced corrosion
  - source_dataset: vt_corrosion
    source_label: severe
    unified_label: corrosion_stain
    rationale: section-loss-level corrosion

  # ---- Insulator defect detection (electrical branch; grid insulators, NOT panels) ----
  - source_dataset: insulator
    source_label: normal
    unified_label: no_defect
    rationale: intact insulator crops broaden no_defect across materials
  - source_dataset: insulator
    source_label: pollution_flashover
    unified_label: insulator_damage
    rationale: flashover contamination damage (merged class per spec)
  - source_dataset: insulator
    source_label: broken
    unified_label: insulator_damage
    rationale: mechanical insulator damage (merged class per spec)
